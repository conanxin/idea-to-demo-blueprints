# IDB-6D PrusaSlicer baseline profile for DIY Lamp Builder shell
# This is a minimal starter profile, not a complete config export.
# Apply these values in PrusaSlicer 2.6+ and tune for your filament.

profile_name = IDB-6D DIY Lamp Shell FDM v0
material_primary = PETG
material_visual_mock = PLA+
nozzle_mm = 0.4
layer_height = 0.2
perimeters = 3
top_solid_layers = 5
bottom_solid_layers = 5
fill_density = 18%
fill_pattern = grid
support_material = 1
support_material_contact_distance = 0.2
support_material_xy_spacing = 0.4
brim_width = 5
avoid_crossing_perimeters = 1
external_perimeters_first = 0
perimeter_speed = 45
infill_speed = 60
support_material_speed = 50
first_layer_speed = 20

# PETG baseline temperatures (calibrate per filament)
bed_temperature = 80
first_layer_bed_temperature = 85
nozzle_temperature = 240
first_layer_nozzle_temperature = 245

# PLA+ baseline temperatures (calibrate per filament)
# bed_temperature = 60
# first_layer_bed_temperature = 65
# nozzle_temperature = 205
# first_layer_nozzle_temperature = 210

# Notes
# - Use a brim to keep long thin shells attached to the bed.
# - Place seam on the back side of the shell.
# - Orient the shell so the back face sits on the bed.
# - Print the fit-test coupon before the full shell.
